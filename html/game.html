<html>
	<head>
		<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>
    <script src="https://unpkg.com/networked-aframe@^0.14.0/dist/networked-aframe.min.js"></script>
	<script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>
		<script type="module" src="/files/js/main.js"></script>
	</head>
	<body>
		<a-scene id="main-scene">
			<a-assets>
				<!-- HUD Bar Images -->
				<img id="empty-bar" src="/files/images/hud/bars/emptyBar.png">
				<img id="full-health-bar" src="/files/images/hud/bars/fullBarHealth.png">
				<img id="full-energy-bar" src="/files/images/hud/bars/fullBarEnergy.png">
				<img id="full-experience-bar" src="/files/images/hud/bars/fullBarExperience.png">
				
				<!-- HUD Hotbar Image -->
				<img id="hotbar" src="/files/images/hud/hotbar.png">
				<img id="selector" src="/files/images/hud/selector.png">
				
				<!-- Item Images -->
				<img id="empty" src="/files/images/items/empty.png">
				<img id="bandages" src="/files/images/items/bandages.png">
				<img id="medic-kit" src="/files/images/items/medic-kit.png">
				<img id="scroll" src="/files/images/items/scroll.png">
				<img id="book" src="/files/images/items/book.png">
				<img id="apple" src="/files/images/items/apple.png">
				<img id="bread" src="/files/images/items/bread.png">

				<!-- Models -->
				<a-asset-item id="shield-model" src="/files/models/shield.glb"></a-asset-item>
				<a-asset-item id="weapon-model" src="/files/models/weapon/Long_Ax_1.gltf"></a-asset-item>
				<a-asset-item id="lootbox-model" src="/files/models/lootbox.glb"></a-asset-item>
				<a-asset-item id="house" src="/files/models/abandoned_house.glb"></a-asset-item>

        		<!-- Avatar Template for Networked-Aframe -->
        		<template id="player-template">
					</a-entity>
					<a-sphere id="networked-player" player-stats color="#5985ff" radius="0.5" collision-box="width: 0.7; height: 0.7; depth: 0.7" position="0 0 0"></a-sphere>
        		</template>
				<template id="weapon-template">
					<a-gltf-model id="networked-weapon" src="#weapon-model" position="0.43 0 -0.3" rotation="0 -90 90" scale="0.7 0.7 0.7"></a-gltf-model>
				</template>
				<template id="shield-template">
					<a-gltf-model id="networked-shield" src="#shield-model" position="-0.05 0 0.3" rotation="0 -90 90" scale="0.3 0.3 0.3"></a-gltf-model>
				</template>
			</a-assets>

			<!-- Player Entity -->
			<a-entity id="local-player" 
                networked="template:#player-template;attachTemplateToLocal:false;" 
                player-stats
                player-hittable
                player-controller="speed: 15; radius: 0.25"
				local-avatar-rig="camera: #playerCamera; head: #local-head; body: #local-body; bodyYOffset: -0.9"
                position="0 1.5 0"
                right-thumbstick-move="controller: #weapon; camera: #playerCamera; speed: 2.8; deadzone: 0.2">

				<!-- Pico Controller (Gamepad API) -->
				<a-entity id="shield" 
						networked="template:#shield-template;attachTemplateToLocal:false;"
						listener 
						controller-input 
						tracked-controls="hand: left; controller: 0; idPrefix: PICO; autoHide: false; space: grip">
					<a-gltf-model position="-0.05 0 0.3" rotation="0 -90 90" scale="0.3 0.3 0.3" src="#shield-model"></a-gltf-model>
					<a-cylinder position="0 0 -0.0" rotation="90 0 0" radius="0.02" height="0.04" color="#FFCAFF"></a-cylinder>
				</a-entity>
				<a-entity id="weapon"
						networked="template:#weapon-template;attachTemplateToLocal:false;"
						tracked-controls="hand: right; controller: 1; idPrefix: PICO; autoHide: false; space: grip"
						raycaster="showLine: true; far: 10; lineColor: #24CAFF"
						cursor="rayOrigin: entity"
						weapon-hit>
					<a-cylinder position="0 0 -0.0" rotation="90 0 0" radius="0.02" height="0.04" color="#24CAFF"></a-cylinder>
					<a-gltf-model position="0.43 0 -0.3" rotation="0 -90 90" src="#weapon-model" scale="0.7 0.7 0.7"></a-gltf-model>
				</a-entity>

        <a-camera id="playerCamera" look-controls="pointerLockEnabled: true" wasd-controls="enabled: false" position="0 0 0">

					<!-- HUD Bars -->
					<a-entity id="hud-bars" visible="true">
						<a-image src="#empty-bar" hud-bar="num: 0"></a-image>
						<a-image id="health-bar" src="#full-health-bar" hud-bar="num: 0"></a-image>

						<a-image src="#empty-bar" hud-bar="num: 2"></a-image>
						<a-image id="experience-bar" src="#full-experience-bar" hud-bar="num: 2"></a-image>

						<a-image src="#empty-bar" hud-bar="num: 1"></a-image>
						<a-image id="energy-bar" src="#full-energy-bar" hud-bar="num: 1"></a-image>
					</a-entity>

					<!-- HUD Hotbar -->
					<a-image id="hud-hotbar" src="#hotbar" hud-overlay position="0 -1.3 -2" width="1.008" height="0.216" rotation="-20 0 0" repeat="1 1">
						<a-image id="hotbar-selector" src="#selector" hud-overlay="renderOrder: 101" position="0 0 0" width="0.216" height="0.216"></a-image>
						<a-image id="hotbar-slot0" src="#empty" hud-hotbar-slot="num: 0"></a-image>
						<a-image id="hotbar-slot1" src="#empty" hud-hotbar-slot="num: 1"></a-image>
						<a-image id="hotbar-slot2" src="#empty" hud-hotbar-slot="num: 2"></a-image>
						<a-image id="hotbar-slot3" src="#empty" hud-hotbar-slot="num: 3"></a-image>
						<a-image id="hotbar-slot4" src="#empty" hud-hotbar-slot="num: 4"></a-image>
					</a-image>

				</a-camera>

			</a-entity>

		    <a-entity environment="preset: forest; dressingAmount: 500"></a-entity>

			<a-gltf-model id="lootbox0" position="-22 1 16" lootbox></a-gltf-model>
			<a-gltf-model id="lootbox1" position="14 1 -24" lootbox></a-gltf-model>
			<a-gltf-model id="lootbox2" position="-7 1 21" lootbox></a-gltf-model>
			<a-gltf-model id="lootbox3" position="23 1 8" lootbox></a-gltf-model>
			<a-gltf-model id="lootbox4" position="-16 1 -14" lootbox></a-gltf-model>
			<a-gltf-model id="lootbox5" position="4 1 24" lootbox></a-gltf-model>
			<a-gltf-model id="lootbox6" position="-25 1 -5" lootbox></a-gltf-model>
			<a-gltf-model id="lootbox7" position="18 1 -11" lootbox></a-gltf-model>
			<a-gltf-model id="lootbox8" position="-3 1 12" lootbox></a-gltf-model>
			<a-gltf-model id="lootbox9" position="10 1 23" lootbox></a-gltf-model>
			<a-gltf-model id="lootbox10" position="-20 1 -24" lootbox></a-gltf-model>

			<a-cylinder position="-22 0 16" radius="0.4" height="1.8" color="#7BC8A4" collision-box="width: 0.8; height: 1.8; depth: 0.8"></a-cylinder>
			<a-cylinder position="14 0 -24" radius="0.4" height="1.8" color="#7BC8A4" collision-box="width: 0.8; height: 1.8; depth: 0.8"></a-cylinder>
			<a-cylinder position="-7 0 21" radius="0.4" height="1.8" color="#7BC8A4" collision-box="width: 0.8; height: 1.8; depth: 0.8"></a-cylinder>
			<a-cylinder position="23 0 8" radius="0.4" height="1.8" color="#7BC8A4" collision-box="width: 0.8; height: 1.8; depth: 0.8"></a-cylinder>
			<a-cylinder position="-16 0 -14" radius="0.4" height="1.8" color="#7BC8A4" collision-box="width: 0.8; height: 1.8; depth: 0.8"></a-cylinder>
			<a-cylinder position="4 0 24" radius="0.4" height="1.8" color="#7BC8A4" collision-box="width: 0.8; height: 1.8; depth: 0.8"></a-cylinder>
			<a-cylinder position="-25 0 -5" radius="0.4" height="1.8" color="#7BC8A4" collision-box="width: 0.8; height: 1.8; depth: 0.8"></a-cylinder>
			<a-cylinder position="18 0 -11" radius="0.4" height="1.8" color="#7BC8A4" collision-box="width: 0.8; height: 1.8; depth: 0.8"></a-cylinder>
			<a-cylinder position="-3 0 12" radius="0.4" height="1.8" color="#7BC8A4" collision-box="width: 0.8; height: 1.8; depth: 0.8"></a-cylinder>
			<a-cylinder position="10 0 23" radius="0.4" height="1.8" color="#7BC8A4" collision-box="width: 0.8; height: 1.8; depth: 0.8"></a-cylinder>
			<a-cylinder position="-20 0 -24" radius="0.4" height="1.8" color="#7BC8A4" collision-box="width: 0.8; height: 1.8; depth: 0.8"></a-cylinder>

            <a-gltf-model id="house" position="-10 0 -10" scale="0.8 0.8 0.8" src="#house" collision-box="width: 7; height: 10; depth: 6; offsetZ: 1"></a-gltf-model>

			<!-- Map boundaries -->
			<a-box id="map-boundary-north" position="0 5 -35" visible="true" collision-box="width: 120; height: 20; depth: 4"></a-box>
			<a-box id="map-boundary-south" position="0 5 35" visible="true" collision-box="width: 120; height: 20; depth: 4"></a-box>
			<a-box id="map-boundary-west" position="-35 5 0" visible="true" collision-box="width: 4; height: 20; depth: 120"></a-box>
			<a-box id="map-boundary-east" position="35 5 0" visible="true" collision-box="width: 4; height: 20; depth: 120"></a-box>

			<a-sky color="#ECECEC"></a-sky>
		</a-scene>

		<script>


		</script>
	</body>
</html>
