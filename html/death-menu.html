    <!-- Sound System -->

    <!-- Death Screen Logic -->
    <script>
        // Initialize sound system for death screen
        const soundManager = initSoundSystem({
            type: 'death',
            buttonSelector: '.death-button',
            primaryButtonSelector: '.death-button',
            navigationKeys: { prev: 'ArrowLeft', next: 'ArrowRight' },
            shortcuts: {
                respawnBtn: 'r',
                menuBtn: 'Escape'
            },
            tracks: ['ambient']
        });
        
        document.addEventListener('DOMContentLoaded', function() {
            
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            
            // Set death cause from URL parameter
            const deathCause = urlParams.get('cause');
            if (deathCause) {
                document.getElementById('deathCause').textContent = deathCause;
            }
            
            // Set respawn button to return to the previous page
            const returnUrl = urlParams.get('returnUrl');
            const respawnBtn = document.getElementById('respawnBtn');
            if (returnUrl && respawnBtn) {
                // Decode the URL and set it as the respawn destination
                respawnBtn.href = decodeURIComponent(returnUrl);
                console.log('🔄 Respawn will return to:', returnUrl);
            } else if (respawnBtn) {
                // Fallback to game.html if no returnUrl provided
                console.log('⚠️ No returnUrl provided, using fallback: game.html');
            }

            // Background image fade-in
            const bgImage = document.querySelector('.bg-video');
            if (bgImage) {
                bgImage.style.opacity = '0';
                bgImage.addEventListener('load', function() {
                    this.style.transition = 'opacity 2s ease';
                    this.style.opacity = '0.2';
                });
            }

            console.log('💀 Death Screen loaded');
            console.log('⌨️ Keyboard: R = Respawn | ESC = Main Menu | Arrow Keys = Navigate');
            console.log('🎮 Gamepad: A = Select | B = Main Menu | D-Pad = Navigate');
        });

        // Performance: Reduce animations on low-end devices
        if (navigator.hardwareConcurrency && navigator.hardwareConcurrency < 4) {
            document.documentElement.style.setProperty('--animation-speed', '0.5');
        }
    </script>
