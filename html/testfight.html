<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>BleatchVR Test Fight</title>
		<!-- Core A-Frame + project modules -->
		<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>
    <script src="https://unpkg.com/networked-aframe@^0.14.0/dist/networked-aframe.min.js"></script>
        <script type="module" src="/files/js/main.js"></script>
	</head>
	<body>
        <!-- Scene with hit damage + energy handling -->
    <a-scene webxr="requiredFeatures: local-floor" fight-energy-system>
			<a-assets>
                <!-- HUD bar textures -->
                <img id="empty-bar" src="/files/images/hud/bars/emptyBar.png">
                <img id="full-health-bar" src="/files/images/hud/bars/fullBarHealth.png">
                <img id="full-energy-bar" src="/files/images/hud/bars/fullBarEnergy.png">
                <img id="full-experience-bar" src="/files/images/hud/bars/fullBarExperience.png">

				<!-- Enemy model -->
				<a-asset-item id="giraffeModel" src="/files/models/toy_giraffe_ujpheaova_low.glb"></a-asset-item>

        <!-- Netzwerk-Template für main.js / player.js Initialisierung -->
        <template id="player-template">
            <a-sphere player-stats radius="0.001" visible="false"></a-sphere>
        </template>
			</a-assets>

            <!-- Player rig with thumbstick locomotion -->
            <a-entity
                id="local-player"
                networked="template:#player-template;attachTemplateToLocal:false;"
                player-stats
                position="0 1.6 -2.6"
                player-controller="radius: 0.25"
                right-thumbstick-move="controller: #weapon; camera: #playerCamera; speed: 2.8; deadzone: 0.2">
                <!-- Camera + fixed HUD in view -->
                <a-camera id="playerCamera" position="0 0 0" look-controls="pointerLockEnabled: true" wasd-controls="enabled: true">
                    <a-entity id="hud-bars" visible="true">
                        <a-image src="#empty-bar" hud-bar="num: 0"></a-image>
                        <a-image id="health-bar" src="#full-health-bar" hud-bar="num: 0"></a-image>
                        <a-image src="#empty-bar" hud-bar="num: 1"></a-image>
                        <a-image id="experience-bar" src="#full-experience-bar" hud-bar="num: 1"></a-image>
                        <a-image src="#empty-bar" hud-bar="num: 2"></a-image>
                        <a-image id="energy-bar" src="#full-energy-bar" hud-bar="num: 2"></a-image>
                    </a-entity>
                </a-camera>

                <!-- Pico Controller (Gamepad API) -->
                <a-entity
                    id="shield"
                    tracked-controls="hand: left; controller: 0; idPrefix: PICO; autoHide: false; space: grip">
                    <a-gltf-model
                        position="-0.1 0 0.42"
                        rotation="0 -90 90"
                        scale="0.5 0.5 0.5"
                        src="/files/models/shield.glb"
                    ></a-gltf-model>
                </a-entity>

                <a-entity
                    id="weapon"
                    tracked-controls="hand: right; controller: 1; idPrefix: PICO; autoHide: false; space: grip"
                    raycaster="showLine: true; far: 10; lineColor: #24CAFF"
                    cursor="rayOrigin: entity"
                >
                    <a-gltf-model
                        id="weaponModel"
                        position="0.622 0 -0.3"
                        rotation="0 -90 90"
                        src="/files/models/weapon/Long_Ax_1.gltf"
                        obb-collider
                    ></a-gltf-model>
                </a-entity>
            </a-entity>

            <!-- Giraffe enemy + Object-Collision + health text -->
            <a-entity
                id="giraffeRoot"
                gltf-model="#giraffeModel"
                position="0 0 -4"
                scale="12.0 12.0 12.0"
                obb-collider
                simple-hit-damage="weapon: #weaponModel; healthText: #giraffeHealth; damage: 20; maxHp: 100">
            </a-entity>

            <a-entity id="giraffeHealth" position="0 2.4 -5" text="value: HP: 100; align: center; color: #ff3333; width: 8"></a-entity>

            <!-- Simple world -->
            <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
            <a-sky color="#ECECEC"></a-sky>
        </a-scene>
	</body>
</html>
